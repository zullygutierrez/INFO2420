<!DOCTYPE html>
<html>


<head>

<meta charset="UTF-8">
	
<title>HTML Practice 6 - Tables</title>

<style type="text/css">

.center {
  text-align: center;
}

.tablewidth {
  margin: auto;
  width: 550px;
}

.caption {
  font-weight: bold;
  color: #003300;
}

.firstcol {
  background-color: #CCCCCC;
  width: 25%;
}

.days {
  background-color: #99FF66;
}

</style>

<div class="center">
  <table class="tablewidth" border="1" cellspacing="0" cellpadding="5">

</head>
<body>
<div >
   <table >
	<caption class="caption">My Class Schedule</caption>

    <colgroup class="firstcol"></colgroup>
    <colgroup class="days" span="5"></colgroup>

    <tr>
      <th>Courses</th>
      <th>Monday</th>
      <th>Tuesday</th>
      <th>Wednesday</th>
      <th>Thursday</th>
      <th>Friday</th>
    </tr>
    <tr>
      <th>INFO 1120</th>
      <td></td>
      <td>9-11</td>
      <td></td>
      <td>9-11</td>
      <td></td>
    </tr>
    <tr>
      <th>MATH 1010</th>
      <td colspan="4">12-1</td>
      <td></td>
    </tr>
    <tr>
      <th>INFO 2420</th>
      <td colspan="5">Online Available 24/7</td>
    </tr>
   </table>
</div>



</body>
</html>
